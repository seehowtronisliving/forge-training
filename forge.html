function openQL() {
  S.qlDay = getCurrentDay(); S.qlExIdx = 0;
  document.getElementById('ql-panel').style.display = 'flex';
  renderQL();
}
function closeQL() { document.getElementById('ql-panel').style.display = 'none'; }

function renderQL() {
  const day = S.qlDay; if (!day) { closeQL(); return; }
  const exItems = getDayExercises(day);
  if (S.qlExIdx >= exItems.length) {
    document.getElementById('ql-ex-name').textContent = 'Done!';
    document.getElementById('ql-rx').textContent = 'All exercises complete';
    document.getElementById('ql-prev').textContent = '';
    const btn = document.getElementById('btn-ql-log');
    if (btn) { btn.textContent = 'Close'; btn.onclick = closeQL; }
    document.getElementById('ql-dots').innerHTML = '';
    document.getElementById('ql-timer-wrap').innerHTML = '';
    return;
  }
  const e = exItems[S.qlExIdx], exId = e.id, ex = EX[exId], cs = S.cardState[exId];
  if (!cs) { S.qlExIdx++; renderQL(); return; }
  const p = cs.prescription, saved = cs.savedIdx.length;
  const cur = cs.sets[saved] || {weight:p.w, reps:p.r, rpe:0};
  const prev = getPrev(exId), prevSet = prev?.sets?.[saved];

  document.getElementById('ql-ex-name').textContent = ex.n;
  document.getElementById('ql-rx').textContent = `${p.sets}×${ex.inc===0?p.r+' reps':`${p.r} @ ${p.w}kg`} · ${S.qlExIdx+1}/${exItems.length}`;
  document.getElementById('ql-prev').textContent = prevSet ? `Last set ${saved+1}: ${prevSet.weight>0?prevSet.weight+'kg × ':''}${prevSet.reps} reps` : '';
  document.getElementById('ql-dots').innerHTML = Array.from({length:cs.sets.length},(_,i)=>
    `<div class="ql-dot${i<saved?' done':i===saved?' cur':''}"></div>`).join('');

  const kgField = document.getElementById('ql-kg-field');
  if (kgField) kgField.style.display = ex.inc===0?'none':'block';
  const kg = document.getElementById('ql-kg'); if(kg) kg.value = cur.weight||p.w||'';
  document.getElementById('ql-reps').value = cur.reps||p.r||'';
  document.getElementById('ql-rpe').value = cur.rpe||'';

  const btn = document.getElementById('btn-ql-log');
  if (btn) { btn.textContent = saved===cs.sets.length-1?'Log final set':`Log set ${saved+1}`; btn.onclick = qlLog; }
  renderQLTimer();
}

function renderQLTimer() {
  const wrap = document.getElementById('ql-timer-wrap'); if (!wrap) return;
  const day = S.qlDay; if (!day) { wrap.innerHTML=''; return; }
  const exItems = getDayExercises(day);
  if (S.qlExIdx >= exItems.length) { wrap.innerHTML=''; return; }
  const exId = exItems[S.qlExIdx].id, cs = S.cardState[exId];
  if (cs?.showTimer && S.timerExId===exId && S.timerEnd) {
    const rem = Math.max(0, Math.ceil((S.timerEnd-Date.now())/1000));
    const m = Math.floor(rem/60), s = rem%60, done = rem<=0;
    wrap.innerHTML = `<div class="ql-timer${done?' done':''}"><span id="ql-timer-display">${done?'Go':`${m}:${String(s).padStart(2,'0')}`}</span><button onclick="stopTimer()">Skip</button></div>`;
  } else { wrap.innerHTML=''; }
}

function qlLog() {
  const day = S.qlDay; if (!day) return;
  const exItems = getDayExercises(day);
  if (S.qlExIdx >= exItems.length) return;
  const exId = exItems[S.qlExIdx].id, cs = S.cardState[exId]; if (!cs) return;
  const saved = cs.savedIdx.length;
  const kg = document.getElementById('ql-kg'); if(kg) cs.sets[saved].weight = parseFloat(kg.value)||0;
  cs.sets[saved].reps = parseInt(document.getElementById('ql-reps')?.value)||0;
  cs.sets[saved].rpe = parseFloat(document.getElementById('ql-rpe')?.value)||0;
  logSet(exId, saved);
  if (S.cardState[exId].savedIdx.length >= cs.sets.length) S.qlExIdx++;
  renderQL();
}
function qlPrev() { if(S.qlExIdx>0){S.qlExIdx--;renderQL();} }
function qlSkip() { S.qlExIdx++; renderQL(); }
function qlNext() { S.qlExIdx++; renderQL(); }

// ── POST WORKOUT ──────────────────────────────────────────────────────
let _pwData = {};
function showPostWorkout(day) {
  const dur = S.sessionStart ? Math.round((Date.now()-S.sessionStart)/60000) : 0;
  let sets=0, vol=0; const prs=[], volByEx=[];
  getDayExercises(day).forEach(e => {
    const cs = S.cardState[e.id]; if (!cs) return;
    const done = cs.sets.filter((_,i)=>cs.savedIdx.includes(i));
    sets += done.length;
    done.forEach(s => vol += (s.weight||0)*(s.reps||0));
    const v = done.reduce((sum,s)=>sum+(s.weight||0)*(s.reps||0),0);
    if(v>0) volByEx.push({name:EX[e.id].n, vol:v, sets:done.length});
    const prev = getPrev(e.id);
    const prevBest = prev ? Math.max(...prev.sets.map(s=>est1RM(s.weight||0,s.reps||0))) : 0;
    const newBest = Math.max(...done.map(s=>est1RM(s.weight||0,s.reps||0)));
    if (newBest > prevBest && newBest > 0) prs.push({name:EX[e.id].n, val:newBest, prev:prevBest});
  });

  _pwData = {sets, vol, dur, prs, dayName:day.name};

  const el = id => document.getElementById(id);
  if(el('pw-title')) el('pw-title').textContent = day.name + ' done';
  if(el('pw-date')) el('pw-date').textContent = fmtDateLong(new Date());
  if(el('pw-stats')) el('pw-stats').innerHTML = [
    {v:dur||'—',l:'Min'},{v:sets,l:'Sets'},
    {v:vol>1000?(vol/1000).toFixed(1)+'t':Math.round(vol)+'kg',l:'Volume'},
  ].map(s=>`<div class="pw-stat"><div class="pw-val">${s.v}</div><div class="pw-lbl">${s.l}</div></div>`).join('');
  if(el('pw-prs')) el('pw-prs').innerHTML = prs.length
    ? `<div class="pw-sec-lbl">Personal records</div>`+prs.map(p=>`<div class="pw-row"><span>${p.name}</span><span class="pw-pr-val">~${p.val}kg</span></div>`).join('')
    : '';
  if(el('pw-vol')) el('pw-vol').innerHTML = volByEx.sort((a,b)=>b.vol-a.vol).map(e=>`<div class="pw-row"><span>${e.name}</span><span class="pw-small">${Math.round(e.vol)}kg · ${e.sets}s</span></div>`).join('');
  const coachEl = el('pw-coach'); if(coachEl) coachEl.style.display='none';
  document.getElementById('pw-modal').style.display = 'flex';
  if(getKey()) getPostWorkoutNote(sets, vol, dur, prs);
}

async function getPostWorkoutNote(sets, vol, dur, prs) {
  try {
    const txt = await ai(
      [{role:'user', content:`Post-workout: ${sets} sets, ${Math.round(vol)}kg volume${dur?`, ${dur}min`:''}${prs.length?`, ${prs.length} PRs`:''}.`}],
      'Post-workout coach. One direct, factual sentence. No filler or praise.',
      80
    );
    if (txt) {
      const el = document.getElementById('pw-coach');
      if (el) { el.textContent = txt; el.style.display='block'; }
    }
  } catch {}
}
function closePW() { document.getElementById('pw-modal').style.display='none'; checkWeekComplete(); }
function shareWorkout() {
  const {sets,vol,dur,prs,dayName} = _pwData;
  const txt = `${dayName} done\n${sets} sets · ${Math.round(vol)}kg${dur?` · ${dur}min`:''}${prs.length?`\n${prs.length} PR${prs.length>1?'s':''}`:''}\nForge`;
  if (navigator.share) navigator.share({title:'Forge',text:txt}).catch(()=>{});
  else navigator.clipboard?.writeText(txt).then(()=>toast('Copied'));
}

function renderProgram() {
  const el = document.getElementById('program-content'); if (!el) return;
  if (!S.program?.weeks) {
    el.innerHTML = `<div class="empty-state"><div class="empty-title">No program</div><div class="empty-sub">Set up your program in the Coach tab.</div><button class="btn-primary" onclick="setPanel('coach')">Open Coach</button></div>`;
    return;
  }
  const p = S.program;
  const ssGroups = p.supersets || [];
  const exSS = {};
  ssGroups.forEach((g,i) => g.forEach(id => exSS[id]=i));

  let html = `
    <div class="prog-header">
      <div class="prog-name">${p.name||'Training Program'}</div>
      <div class="prog-desc">${p.description||''}</div>
    </div>`;

  p.weeks.forEach((week, wi) => {
    const isCurrent = wi+1 === S.weekNum;
    html += `<div class="prog-week${isCurrent?' prog-week-current':''}">
      <div class="prog-week-lbl">Week ${wi+1}${week.type?' — '+week.type:''}${isCurrent?' · Current':''}</div>`;
    week.days.forEach(day => {
      const done = isCurrent && S.history.some(h=>h.weekNum===S.weekNum&&h.dayId===day.id&&h.completed);
      html += `<div class="prog-day${done?' prog-day-done':''}">
        <div class="prog-day-hdr">
          <div><div class="prog-day-name">${day.name}</div><div class="prog-day-focus">${day.focus||''}</div></div>
          ${done?'<span class="prog-done-badge">Done</span>':''}
        </div>`;
      const rendered = new Set();
      (day.exercises||[]).forEach(e => {
        if (rendered.has(e.id)) return;
        const gi = exSS[e.id];
        const ex = EX[e.id]; if (!ex) return;
        if (gi !== undefined) {
          const partner = day.exercises.find(x => exSS[x.id]===gi && x.id!==e.id);
          if (partner && !rendered.has(partner.id)) {
            rendered.add(e.id); rendered.add(partner.id);
            const pex = EX[partner.id];
            html += `<div class="prog-ss-pair">
              <div class="prog-ex"><span class="prog-ex-name">${ex.n}</span><span class="prog-ex-scheme">${e.sets}×${e.reps}</span></div>
              <div class="prog-ss-line"></div>
              <div class="prog-ex"><span class="prog-ex-name">${pex?.n||partner.id}</span><span class="prog-ex-scheme">${partner.sets}×${partner.reps}</span></div>
              <span class="prog-ss-tag">SS</span>
            </div>`;
            return;
          }
        }
        rendered.add(e.id);
        html += `<div class="prog-ex"><span class="prog-ex-name">${ex.n}</span><span class="prog-ex-scheme">${e.sets}×${e.reps}</span></div>`;
      });
      html += `</div>`;
    });
    html += `</div>`;
  });

  if (p.notes) html += `<div class="prog-notes">${p.notes}</div>`;
  if (getKey()) html += `<button class="btn-regen" onclick="regenProgram()">Regenerate program</button>`;
  el.innerHTML = html;
}

function renderLiftChart() {
  const exId = document.getElementById('lift-sel')?.value || 'bench';
  const lift = TRACKED_LIFTS.find(l=>l.id===exId);
  const el = document.getElementById('lift-chart'); if (!el) return;
  const hist = S.history.filter(h=>h.exerciseId===exId&&h.sets?.length).slice(-16);
  const goal = parseInt(S.profile?.goals?.[lift?.gk]) || 0;

  if (!hist.length) {
    el.innerHTML = `<div class="empty-sub" style="padding:24px 0">No data yet for this lift.</div>`;
    return;
  }

  const data = hist.map(h => ({
    date: fmtDate(h.date),
    best1rm: Math.max(...h.sets.map(s=>est1RM(s.weight||0,s.reps||0))),
    maxReps: Math.max(...h.sets.map(s=>s.reps||0)),
    avgRpe: (() => { const rs=h.sets.filter(s=>s.rpe>0); return rs.length?(rs.reduce((a,s)=>a+s.rpe,0)/rs.length).toFixed(1):'—'; })(),
  }));

  const best = Math.max(...data.map(d=>d.best1rm));
  const pct = goal > 0 ? Math.min(100, best/goal*100) : 0;
  const minRM = Math.min(...data.map(d=>d.best1rm));
  const maxRM = Math.max(...data.map(d=>d.best1rm));
  const range = maxRM - minRM || 1;

  el.innerHTML = `
    <div class="lift-hero">
      <div class="lift-1rm-val">~${best}<span class="lift-1rm-unit">kg est. 1RM</span></div>
      ${goal ? `<div class="lift-goal-txt">Goal: ${goal}kg · ${pct.toFixed(0)}%</div>` : ''}
    </div>
    ${goal ? `<div class="goal-bar"><div class="goal-fill" style="width:${pct}%"></div></div>` : ''}
    <div class="chart-box">
      <div class="chart-lbl">Estimated 1RM over time</div>
      <div class="chart-bars">
        ${data.map((d,i)=>{
          const h = Math.max(((d.best1rm-minRM)/range)*68+6,4);
          return `<div class="chart-col${i===data.length-1?' latest':''}">
            <div class="chart-val">${d.best1rm}</div>
            <div class="chart-bar" style="height:${h}px"></div>
            <div class="chart-date">${d.date}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="data-tbl">
      <div class="tbl-head"><span>Date</span><span>Reps</span><span>RPE</span><span>~1RM</span></div>
      ${data.slice().reverse().map(d=>`
        <div class="tbl-row">
          <span class="tbl-date">${d.date}</span>
          <span>${d.maxReps}</span>
          <span>${d.avgRpe}</span>
          <span class="tbl-1rm">~${d.best1rm}</span>
        </div>`).join('')}
    </div>`;
}

async function sendCoach() {
  const input = document.getElementById('coach-input');
  const text = input?.value?.trim(); if (!text) return;
  const key = getKey();
  if (!key) { toast('Add API key first', 'err'); return; }
  if (input) input.value = '';
  S.coachHistory.push({role:'user', content:text});
  renderCoachMsgs();
  const el = document.getElementById('coach-msgs');
  const ld = document.createElement('div'); ld.className='cmsg loading'; ld.textContent='Thinking…';
  if (el) { el.appendChild(ld); el.scrollTop=el.scrollHeight; }
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:600,system:buildCoachSystem(),messages:S.coachHistory.map(m=>({role:m.role,content:m.content}))})
    });
    if (!resp.ok) { const e=await resp.json().catch(()=>({})); throw new Error(e.error?.message||`HTTP ${resp.status}`); }
    const d = await resp.json();
    const reply = d.content?.[0]?.text || 'No response';
    S.coachHistory.push({role:'assistant', content:reply});
    if (S.coachHistory.length > 40) S.coachHistory = S.coachHistory.slice(-40);
    save(); ld.remove(); renderCoachMsgs();
  } catch(e) {
    ld.className='cmsg ai'; ld.style.color='var(--err)';
    ld.textContent = `Error: ${e.message}`;
  }
}

function exportData() {

  a.href=url; a.download=`forge-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  toast('Exported');
}
function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (!confirm('Import and replace current data?')) return;
      if(d.profile) S.profile=d.profile; if(d.program) S.program=d.program;
      if(d.history) S.history=d.history; if(d.bwLog) S.bwLog=d.bwLog;
      if(d.prefs) S.prefs={...S.prefs,...d.prefs}; if(d.weekNum) S.weekNum=d.weekNum;
      save(); renderSettings(); renderToday(); toast('Imported');
    } catch { toast('Invalid file', 'err'); }
  };
  reader.readAsText(file); e.target.value='';
}
function resetAll() {
  if (!confirm('Delete all data?')) return;
  if (!confirm('Really sure? This cannot be undone.')) return;
  ['forge-v4-a','forge-v4-b','forge-saved'].forEach(k=>localStorage.removeItem(k));
  location.reload();
}

// ── PROGRAM GENERATION ────────────────────────────────────────────────
async function generateProgram() {
  const p = S.profile; if (!p) throw new Error('No profile');
  const key = getKey(); if (!key) throw new Error('No API key');

  const recentHist = S.history.slice(-20).map(h=>{
    const ex=EX[h.exerciseId];
    return `${fmtDate(h.date)} ${ex?.n||h.exerciseId}: ${h.sets.map(s=>`${s.weight>0?s.weight+'kg×':''}${s.reps}`).join(', ')}`;
  }).join('\n');

  const avgRpeByEx = {};
  Object.keys(EX).forEach(id => {
    const rpe = getRecentRPE(id);
    if (rpe !== null) avgRpeByEx[id] = rpe.toFixed(1);
  });

  const ssPref = S.prefs.supersets
    ? 'Yes — pair non-competing accessories as supersets for efficiency (e.g. lateral raise + face pull, curls + triceps). NEVER superset primary compound lifts (bench, hack squat, RDL, weighted pull-ups, landmine). Apply intelligently based on goals and recovery, not mechanically.'
    : 'No supersets.';

  const prompt = `Generate a complete personalised strength training program. Return ONLY valid JSON with no explanation.

ATHLETE PROFILE:
${p.name}, ${p.sex||'male'}, ${p.age}yo, ${p.weight}kg, ${p.height}cm, ${p.bodyfat||'?'}% BF
Goals: ${JSON.stringify(p.goals||{})}
Training: ${p.frequency||3}x/week, ${p.sessionDuration||60}min sessions
Gym: ${p.gymEquipment||'full commercial gym'}
Home: ${p.homeEquipment||'adjustable dumbbells, adjustable bench, resistance bands'}
Injuries: ${(p.injuries||[]).join(', ')||'none'}
Exclusions: ${(p.exclusions||[]).join(', ')||'none'}
Supersets: ${ssPref}

RECENT TRAINING HISTORY (use for starting weights):
${recentHist||'No history — use conservative starting weights'}

RECENT AVERAGE RPE BY EXERCISE (use to calibrate intensity):
${Object.entries(avgRpeByEx).map(([k,v])=>`${EX[k]?.n||k}: ${v}`).join(', ')||'none'}

Generate a 12-week program (3 phases of 4 weeks):
- Phase 1: Accumulation — higher volume (3-4 sets), moderate intensity (RPE 7-8)
- Phase 2: Intensification — lower volume (3-5 sets), higher intensity (RPE 8-9)
- Phase 3: Peak — lower volume (2-4 sets), high intensity (RPE 9+), final week test

CONSTRAINTS:
- Do NOT include any excluded exercises
- Respect injuries: for shoulder impingement avoid overhead press, upright rows, behind-neck movements; favour landmine press, incline DB, cable flies at low angle
- Keep sessions under ${p.sessionDuration||60} minutes — max 6 exercises per day for ${p.frequency||3}x/week
- For ${p.frequency||3}x/week, use ${p.frequency||3} days per week

DROP SETS / FAILURE SETS: Where appropriate for hypertrophy goals, note in the exercise reps field (e.g. "10 + dropset" or "12 to failure"). Apply intelligently, not to every exercise.

Return this exact JSON structure (all 12 weeks — repeat similar structure for same phase):
{
  "name": "Program name",
  "description": "One sentence",
  "currentPhase": 1,
  "weeks": [
    {
      "weekNum": 1,
      "type": "accumulation",
      "days": [
        {
          "id": "A",
          "name": "Day A",
          "focus": "Upper — Strength",
          "exercises": [
            {"id": "bench", "sets": 4, "reps": "3-5", "startWeight": 80}
          ]
        }
      ]
    }
  ],
  "supersets": [["lat_raise","face_pull"],["hammer_curl","tricep_pd"]],
  "notes": "Brief program notes"
}

Valid exercise IDs only: bench,incline_db,cable_fly,db_fly,pushup,landmine,pullups,pullups_bw,lat_pd,cs_row,cable_row,straight_arm,lat_raise,face_pull,band_fp,hammer_curl,ez_curl,skull,tricep_pd,band_tricep,hack_squat,leg_press,rdl,bss,hip_thrust,leg_curl,calf_raise,hanging_leg,plank`;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,messages:[{role:'user',content:prompt}]})
  });
  if (!resp.ok) { const e=await resp.json().catch(()=>({})); throw new Error(e.error?.message||`HTTP ${resp.status}`); }
  const d = await resp.json();
  const raw = d.content?.[0]?.text || '';
  const match = raw.match(/\{[\s\S]+\}/);
  if (!match) throw new Error('Could not parse program JSON from AI response');
  S.program = JSON.parse(match[0]);
  S.weekNum = 1; S.cardState = {};
  save();
}

function addSetupMsg(role, content) {
  const el = document.getElementById('setup-msgs'); if (!el) return;
  const div = document.createElement('div');
  div.className = `smsg ${role}`;
  div.textContent = content;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function saveSetupKey() {
  const k = (document.getElementById('setup-key-input')?.value||'').replace(/[\s\n\r\t]/g,'');
  if (!k) { toast('Enter your API key', 'err'); return; }
  if (!k.startsWith('sk-ant-')) { toast('Key should start with sk-ant-', 'err'); return; }
  S.prefs.apiKey = k; if(S.profile) S.profile.apiKey = k;
  save();
  document.getElementById('setup-key-wrap').style.display = 'none';
  startSetup();
}

function startSetup() {
  if (S.setupHistory.length > 0) {
    S.setupHistory.forEach(m => addSetupMsg(m.role==='user'?'user':'forge', m.content));
    if (S.profile?.name && S.profile?.goals) {
      addSetupMsg('forge', `Welcome back${S.profile.name?' '+S.profile.name:''}. Your profile is set up — tap Start Training to go to your workout.`);
      showLaunchBtn();
    }
    return;
  }
  const intro = `Hi! I'll help build your training program. It takes about 2 minutes — I'll ask a few questions one at a time. Let's start: what's your name, and how old are you?`;
  addSetupMsg('forge', intro);
  S.setupHistory.push({role:'assistant', content:intro});
  save();
}

function showLaunchBtn() {
  const el = document.getElementById('setup-msgs');
  const btn = document.createElement('div');
  btn.style.cssText = 'padding:16px 0 4px';
  btn.innerHTML = `<button onclick="launchApp()" style="width:100%;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:600;letter-spacing:-.01em">Start training</button>`;
  el.appendChild(btn);
  el.scrollTop = el.scrollHeight;
}

async function sendSetup() {
  const input = document.getElementById('setup-input');
  const text = input?.value?.trim(); if (!text) return;
  const key = getKey();
  if (!key) { toast('Save your API key first', 'err'); return; }
  if (input) { input.value=''; input.style.height='auto'; }
  addSetupMsg('user', text);
  S.setupHistory.push({role:'user', content:text});
  const el = document.getElementById('setup-msgs');
  const ld = document.createElement('div'); ld.className='smsg loading'; ld.textContent='…';
  if(el) { el.appendChild(ld); el.scrollTop=el.scrollHeight; }

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001', max_tokens:500,
        system:`You are onboarding a new user for Forge, a strength training app. Gather their profile through natural conversation, one topic at a time.

Collect in order (but naturally, combining where it flows):
1. Name and age
2. Biological sex (male/female) — for calorie calculations
3. Weight (kg) and height (cm) — accept imperial and note you'll convert
4. Body fat % — estimate fine
5. Primary goals (strength, muscle, fat loss, specific lift targets like bench 100kg or 15 pull-ups)
6. Training frequency (days/week) and session duration (minutes)
7. Equipment (gym description + home equipment)
8. Any injuries or movement restrictions
9. Exercise exclusions

When you have enough (minimum: name, age, sex, weight, height, goals, frequency), output a JSON profile inside <PROFILE></PROFILE> tags, then say their program is being generated.

Keep replies brief — 1-2 sentences. Be warm but efficient. Don't re-ask answered questions. Accept approximate values.`,
        messages: S.setupHistory.map(m=>({role:m.role, content:m.content}))
      })
    });
    if (!resp.ok) { const e=await resp.json().catch(()=>({})); throw new Error(e.error?.message||`HTTP ${resp.status}`); }
    const d = await resp.json();
    const reply = d.content?.[0]?.text || '';
    const profileMatch = reply.match(/<PROFILE>([\s\S]+?)<\/PROFILE>/);
    const displayText = reply.replace(/<PROFILE>[\s\S]+?<\/PROFILE>/,'').trim();
    S.setupHistory.push({role:'assistant', content:reply});
    if(ld) ld.remove();
    if (displayText) addSetupMsg('forge', displayText);

    if (profileMatch) {
      try {
        const profile = JSON.parse(profileMatch[1].trim());
        // Auto-convert imperial
        if (profile.weight > 160) profile.weight = Math.round(profile.weight * 0.453592 * 10) / 10;
        if (profile.height > 0 && profile.height < 100) profile.height = Math.round(profile.height * 2.54);
        profile.apiKey = key;
        S.profile = profile;
        save();
        addSetupMsg('forge', 'Generating your program — this takes about 10 seconds…');
        try {
          await generateProgram();
          const done = `Your program is ready — ${S.program?.name}. ${S.program?.description||''}`;
          addSetupMsg('forge', done);
          S.setupHistory.push({role:'assistant', content:done});
          save();
          showLaunchBtn();
        } catch(e) {
          addSetupMsg('forge', `Program generation failed: ${e.message}. You can try again from Settings.`);
          showLaunchBtn();
        }
      } catch(e) {
        addSetupMsg('forge', `Profile parsing error: ${e.message}`);
        if (S.profile) showLaunchBtn();
      }
    }
    save();
    if(el) el.scrollTop=el.scrollHeight;
  } catch(e) {
    if(ld) ld.remove();
    addSetupMsg('forge', `Error: ${e.message}`);
  }
}

function launchApp() {
  document.getElementById('screen-setup').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');
  updateHeader();
  renderToday();
}

// ── INIT ──────────────────────────────────────────────────────────────
(function init() {
  const loaded = load();
  if (loaded && S.profile) {
    launchApp();
  } else {
    document.getElementById('screen-setup').classList.add('active');
    if (getKey()) {
      document.getElementById('setup-key-wrap').style.display = 'none';
      startSetup();
    }
  }
})();

</script>
