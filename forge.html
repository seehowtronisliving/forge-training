<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="light">
<meta name="apple-mobile-web-app-title" content="Forge">
<meta name="theme-color" content="#F4F1EC">
<title>Forge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;1,400&display=swap');
:root {
  --bg:#F4F1EC; --bg1:#EDEAE4; --bg2:#FFFFFF; --bg3:#F9F7F4;
  --line:#E2DDD6; --line2:#D4CFC7;
  --text:#1C1A17; --text2:#6B6560; --text3:#A09890; --text4:#C4BDB5;
  --accent:#C4965A; --accent-l:#F0E6D6; --accent-d:#7A5A30;
  --ok:#5A8F6B; --ok-bg:#EBF4EE; --ok-line:#C8DFD0;
  --err:#B85050; --err-bg:#F5EBEB;
  --info:#7A8FA6; --info-bg:#EBF0F5; --info-line:#C8D8E8;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  --r:8px; --r2:12px; --r3:4px;
  --st:env(safe-area-inset-top,50px);
  --sb:env(safe-area-inset-bottom,20px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;font-size:15px;overflow-x:hidden;line-height:1.5}
input,select,textarea,button{font-family:var(--font);color:var(--text)}
::-webkit-scrollbar{width:0}
button{cursor:pointer;border:none;background:transparent}
input[type=number]::-webkit-inner-spin-button{opacity:0}

/* SCREENS */
.screen{display:none;flex-direction:column;min-height:100vh;max-width:600px;margin:0 auto}
.screen.active{display:flex}

/* SETUP */
#screen-setup{background:var(--bg)}
.setup-wrap{display:flex;flex-direction:column;height:100vh;padding-top:var(--st)}
.setup-hdr{padding:18px 22px 14px;border-bottom:1px solid var(--line);flex-shrink:0}
.setup-logo{font-size:20px;font-weight:600;letter-spacing:-.02em;color:var(--text);margin-bottom:1px}
.setup-tagline{font-size:13px;color:var(--text3)}
#setup-key-wrap{padding:14px 22px;background:var(--accent-l);border-bottom:1px solid #DFD0B8;flex-shrink:0}
.setup-key-lbl{font-size:12px;font-weight:600;color:var(--accent-d);letter-spacing:.03em;margin-bottom:8px}
.setup-key-row{display:flex;gap:8px}
.setup-key-in{flex:1;background:var(--bg2);border:1px solid #DFD0B8;border-radius:var(--r);padding:11px 14px;font-size:14px;outline:none}
.setup-key-in:focus{border-color:var(--accent)}
.btn-setup-key{padding:11px 16px;background:var(--accent);color:#fff;border-radius:var(--r);font-size:13px;font-weight:600;white-space:nowrap}
#setup-msgs{flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:12px}
.smsg{max-width:88%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.65}
.smsg.forge{align-self:flex-start;background:var(--bg2);border:1px solid var(--line);color:var(--text2);border-bottom-left-radius:4px}
.smsg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.smsg.loading{align-self:flex-start;background:var(--bg2);border:1px solid var(--line);color:var(--text3);font-style:italic}
.setup-input-row{padding:12px 22px calc(var(--sb) + 12px);border-top:1px solid var(--line);flex-shrink:0;display:flex;gap:8px;background:var(--bg)}
.setup-input{flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:22px;padding:11px 16px;font-size:14px;outline:none;resize:none;max-height:110px;line-height:1.5}
.setup-input:focus{border-color:var(--accent)}
.btn-setup-send{width:42px;height:42px;background:var(--accent);color:#fff;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:flex-end}

/* APP SHELL */
#screen-app{background:var(--bg)}
#sb-spacer{height:var(--st);min-height:50px;background:var(--bg1);flex-shrink:0}
#top-nav{background:var(--bg1);border-bottom:1px solid var(--line);display:flex;flex-shrink:0;position:sticky;top:0;z-index:200}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px 9px;border-bottom:2px solid transparent;background:transparent;border-left:none;border-right:none;border-top:none;transition:border-color .15s}
.nav-icon svg{width:18px;height:18px;stroke:var(--text3);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s;display:block}
.nav-lbl{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:.02em;transition:color .15s}
.nav-btn.active{border-bottom-color:var(--accent)}
.nav-btn.active .nav-icon svg{stroke:var(--accent)}
.nav-btn.active .nav-lbl{color:var(--accent)}
#app-header{background:var(--bg1);border-bottom:1px solid var(--line);padding:12px 20px;flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.hdr-logo{font-size:20px;font-weight:600;letter-spacing:-.02em;color:var(--text)}
.hdr-info{font-size:12px;font-weight:500;color:var(--text3)}
#session-bar{background:var(--ok-bg);border-bottom:1px solid var(--ok-line);padding:8px 20px;display:none;justify-content:space-between;align-items:center;flex-shrink:0}
.sess-time{font-size:18px;font-weight:600;color:var(--ok);font-variant-numeric:tabular-nums}
.btn-end{font-size:13px;font-weight:500;color:var(--text2);background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r3);padding:6px 14px}
#app-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.panel{display:none;padding:20px 18px calc(var(--sb) + 80px)}
.panel.active{display:block}

/* TOAST */
#toast{position:fixed;bottom:calc(var(--sb) + 78px);left:50%;transform:translateX(-50%) translateY(8px);background:var(--text);color:var(--bg);border-radius:var(--r2);padding:10px 18px;z-index:900;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap;font-size:13px;font-weight:500}
.toast-show{opacity:1!important;transform:translateX(-50%) translateY(0)!important}
.toast-gold{background:var(--accent)!important;color:#fff!important}
.toast-err{background:var(--err)!important;color:#fff!important}

/* SHARED */
.empty-state{text-align:center;padding:60px 24px}
.empty-title{font-size:20px;font-weight:600;letter-spacing:-.01em;color:var(--text);margin-bottom:8px}
.empty-sub{font-size:14px;color:var(--text3);line-height:1.6;margin-bottom:22px}
.btn-primary{padding:13px 24px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600}
.btn-sm{padding:8px 14px;border:1px solid var(--line2);border-radius:var(--r3);color:var(--text3);font-size:13px;font-weight:500;background:var(--bg2)}

/* TODAY */
.today-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.today-day{font-size:26px;font-weight:600;letter-spacing:-.02em;color:var(--text);margin-bottom:3px}
.today-focus{font-size:14px;color:var(--text3)}
.today-actions{display:flex;gap:7px;flex-shrink:0;margin-top:4px}

/* EXERCISE CARD */
.ex-card{background:var(--bg2);border:1px solid var(--line);border-left:3px solid var(--line);border-radius:var(--r2);margin-bottom:10px;overflow:hidden;transition:box-shadow .2s}
.ex-card.expanded{box-shadow:0 2px 14px rgba(28,26,23,.07)}
.ex-card.done{border-left-color:var(--ok)}
.ex-card.inprog{border-left-color:var(--accent)}
.ex-header{display:flex;align-items:flex-start;padding:15px 15px;cursor:pointer;user-select:none;gap:10px}
.ex-hdr-main{flex:1;min-width:0}
.ex-name{font-size:16px;font-weight:600;color:var(--text);letter-spacing:-.01em;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ex-card.done .ex-name{color:var(--ok)}
.sub-badge{font-size:11px;font-weight:500;color:var(--info);background:var(--info-bg);border:1px solid var(--info-line);border-radius:var(--r3);padding:1px 7px;margin-left:6px;vertical-align:middle;font-style:normal}
.ex-rx{font-size:13px;color:var(--text2);margin-bottom:2px}
.ex-prev{font-size:12px;color:var(--text3);margin-top:2px}
.ex-1rm{color:var(--accent);font-weight:500}
.ex-note{font-size:12px;font-weight:500;margin-top:3px}
.ex-note.warn{color:var(--err)}
.ex-note.good{color:var(--ok)}
.ex-hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;padding-top:2px}
.chevron{font-size:11px;color:var(--text3)}
.btn-swap{padding:4px 9px;border:1px solid var(--line);border-radius:var(--r3);color:var(--text3);font-size:11px;font-weight:500;background:var(--bg)}
.done-tick{font-size:14px;color:var(--ok);font-weight:600}
.inprog-ct{font-size:11px;color:var(--accent);font-weight:600;font-variant-numeric:tabular-nums}
.ex-body{padding:0 15px 15px;border-top:1px solid var(--line);display:none}
.ex-card.expanded .ex-body{display:block}

/* SUPERSET CARD */
.ss-card-wrap{margin-bottom:10px;position:relative}
.ss-label{font-size:10px;font-weight:600;color:var(--info);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;padding-left:4px}
.ss-card-wrap .ex-card{margin-bottom:0;border-radius:var(--r2) var(--r2) 0 0}
.ss-card-wrap .ex-card:last-of-type{border-radius:0 0 var(--r2) var(--r2);border-top:none}
.ss-connector{width:2px;height:10px;background:var(--info-line);margin-left:20px}

/* WARMUP */
.warmup-row{display:flex;gap:5px;margin:12px 0 14px;flex-wrap:wrap}
.wu-chip{background:var(--bg3);border:1px solid var(--line);border-radius:var(--r3);padding:7px 10px;text-align:center;min-width:50px}
.wu-chip.wu-work{border-color:var(--accent);background:var(--accent-l)}
.wu-pct{font-size:10px;font-weight:500;color:var(--text3);margin-bottom:3px}
.wu-chip.wu-work .wu-pct{color:var(--accent-d)}
.wu-w{font-size:14px;font-weight:600;color:var(--text2);font-variant-numeric:tabular-nums}
.wu-chip.wu-work .wu-w{color:var(--accent)}
.wu-r{font-size:10px;color:var(--text3);margin-top:2px}

/* TIMER */
.timer-wrap{background:var(--bg3);border:1px solid var(--line);border-radius:var(--r2);padding:12px 14px;display:flex;align-items:center;gap:12px;margin:12px 0;transition:background .3s,border-color .3s}
.timer-wrap.done{background:var(--ok-bg);border-color:var(--ok-line)}
.timer-ring-wrap{position:relative;width:54px;height:54px;flex-shrink:0}
.timer-svg{width:54px;height:54px}
.timer-display{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);font-variant-numeric:tabular-nums}
.timer-wrap.done .timer-display{color:var(--ok)}
.timer-controls{flex:1}
.timer-lbl{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:7px}
.timer-wrap.done .timer-lbl{color:var(--ok)}
.timer-adj-row{display:flex;gap:5px;flex-wrap:wrap}
.btn-adj{padding:5px 8px;background:var(--bg2);border:1px solid var(--line);color:var(--text3);border-radius:var(--r3);font-size:12px;font-weight:500}
.btn-skip{padding:5px 11px;border:1px solid var(--line2);color:var(--text2);border-radius:var(--r3);font-size:12px;font-weight:500;background:var(--bg2);transition:all .2s}
.timer-wrap.done .btn-skip{background:var(--ok);border-color:var(--ok);color:#fff}

/* SETS */
.completed-section{margin-bottom:12px}
.completed-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;margin-top:14px}
.completed-lbl{font-size:11px;font-weight:600;color:var(--ok);letter-spacing:.05em;text-transform:uppercase}
.btn-edit-sets,.btn-edit-done{font-size:12px;font-weight:500;color:var(--accent);background:transparent;border:1px solid #DFD0B8;border-radius:var(--r3);padding:3px 10px}
.pending-lbl{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;margin:14px 0 8px}
.set-row{display:flex;align-items:center;gap:6px;padding:5px 3px;border-radius:var(--r3);border:1px solid transparent;margin-bottom:4px;transition:all .15s}
.set-row.locked{background:var(--ok-bg);border-color:var(--ok-line)}
.set-row.editing{background:var(--accent-l);border-color:#DFD0B8}
.set-row.pending{background:var(--bg3);border-color:var(--line)}
.set-row.next-set{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 5%,var(--bg3))}
.set-num{font-size:12px;font-weight:500;color:var(--text3);width:18px;text-align:center;flex-shrink:0;font-variant-numeric:tabular-nums}
.set-fields{display:flex;gap:5px;flex:1}
.fw{flex:1}
.fl{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:3px;text-align:center}
.field-inner{display:flex;gap:3px;align-items:flex-start}
.fi{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--text);border-radius:var(--r3);padding:9px 4px;font-size:16px;font-weight:500;outline:none;-webkit-appearance:none;text-align:center;transition:border-color .15s;font-variant-numeric:tabular-nums}
.fi:focus{border-color:var(--accent)}
.fi.filled{border-color:color-mix(in srgb,var(--accent) 40%,transparent)}
.fi[readonly]{background:transparent;border-color:transparent;color:var(--text2);pointer-events:none}
.prev-hint{font-size:10px;color:var(--text4);text-align:center;margin-top:3px;font-variant-numeric:tabular-nums}
.plate-calc-btn{font-size:13px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r3);padding:3px 6px;flex-shrink:0;color:var(--text3);align-self:flex-start;margin-top:9px}
.btn-log{width:100%;padding:13px;margin:8px 0 0;background:transparent;border:1px solid var(--line2);color:var(--text3);border-radius:var(--r);font-size:14px;font-weight:500;transition:all .15s}
.btn-log-ready{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-add-set{width:100%;padding:9px;margin-top:6px;background:transparent;border:1px dashed var(--line2);color:var(--text3);border-radius:var(--r);font-size:13px;font-weight:500}
.all-done{text-align:center;padding:10px;font-size:13px;font-weight:600;color:var(--ok)}
.btn-hist{margin-top:12px;padding:7px 12px;background:var(--bg);border:1px solid var(--line);color:var(--text3);border-radius:var(--r3);font-size:12px;font-weight:500}
.hist-rows{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;display:none}
.hist-rows.open{display:block}
.h-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line)}
.h-date{font-size:13px;color:var(--text3)}
.h-sets{font-size:13px;font-weight:500;color:var(--text2);font-variant-numeric:tabular-nums}
.btn-add-ex{width:100%;padding:13px;margin-top:8px;background:transparent;border:1px dashed var(--line2);color:var(--text3);border-radius:var(--r);font-size:14px;font-weight:500}

/* PLATE POPUP */
.plate-popup{background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r2);padding:14px 16px;box-shadow:0 8px 32px rgba(28,26,23,.14);min-width:200px}
.plate-popup-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px}
.plate-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line)}
.plate-ct{font-size:20px;font-weight:600;color:var(--accent);font-variant-numeric:tabular-nums}
.plate-note,.plate-sides{font-size:12px;color:var(--text3);margin-top:8px;line-height:1.5}
.btn-plate-close{width:100%;margin-top:10px;padding:8px;background:var(--bg3);border:1px solid var(--line);color:var(--text3);border-radius:var(--r3);font-size:13px;font-weight:500}

/* POST WORKOUT */
#pw-modal{position:fixed;inset:0;background:rgba(28,26,23,.45);z-index:700;display:none;align-items:flex-end}
.pw-sheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:26px 20px calc(var(--sb) + 26px);width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 -4px 24px rgba(28,26,23,.08)}
.pw-eyebrow{font-size:11px;font-weight:600;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.pw-title{font-size:28px;font-weight:600;letter-spacing:-.02em;margin-bottom:4px}
.pw-date{font-size:13px;color:var(--text3);margin-bottom:22px}
.pw-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
.pw-stat{background:var(--bg3);border:1px solid var(--line);border-radius:var(--r);padding:13px 10px;text-align:center}
.pw-val{font-size:22px;font-weight:600;color:var(--accent);font-variant-numeric:tabular-nums}
.pw-lbl{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:.04em;text-transform:uppercase;margin-top:3px}
#pw-coach{background:var(--accent-l);border:1px solid #DFD0B8;border-radius:var(--r);padding:13px 15px;margin-bottom:16px;font-size:14px;color:var(--accent-d);line-height:1.65;font-style:italic;display:none}
.pw-sec-lbl{font-size:11px;font-weight:600;color:var(--ok);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.pw-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line)}
.pw-pr-val{font-size:14px;font-weight:600;color:var(--accent);font-variant-numeric:tabular-nums}
.pw-small{font-size:12px;color:var(--text3);font-variant-numeric:tabular-nums}
.btn-pw-share{width:100%;padding:14px;background:var(--accent);border:none;color:#fff;border-radius:var(--r);font-size:15px;font-weight:600;margin:16px 0 7px}
.btn-pw-close{width:100%;padding:12px;background:transparent;border:1px solid var(--line2);color:var(--text3);border-radius:var(--r);font-size:14px;font-weight:500}

/* SWAP + ADD EX MODALS */
.bottom-modal{position:fixed;inset:0;background:rgba(28,26,23,.45);z-index:400;display:none;align-items:flex-end}
.modal-sheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:22px 18px calc(var(--sb) + 22px);width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 -4px 24px rgba(28,26,23,.08)}
.modal-title{font-size:20px;font-weight:600;letter-spacing:-.01em;margin-bottom:4px;color:var(--text)}
.modal-sub{font-size:13px;color:var(--text3);margin-bottom:16px;line-height:1.5}
.swap-opt{padding:13px 0;border-bottom:1px solid var(--line);cursor:pointer}
.swap-opt:active{opacity:.7}
.swap-opt-name{font-size:15px;font-weight:500;color:var(--text);margin-bottom:2px}
.swap-opt-meta{font-size:12px;color:var(--text3)}
.btn-modal-close{width:100%;margin-top:14px;padding:12px;background:var(--bg3);border:1px solid var(--line2);color:var(--text2);border-radius:var(--r);font-size:14px;font-weight:500}
.add-search{width:100%;background:var(--bg3);border:1px solid var(--line);color:var(--text);border-radius:var(--r);padding:12px 15px;font-size:14px;outline:none;margin-bottom:11px}
.add-search:focus{border-color:var(--accent)}
.m-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.m-chip{padding:7px 13px;border-radius:20px;border:1px solid var(--line2);color:var(--text3);font-size:13px;font-weight:400;cursor:pointer;background:var(--bg2)}
.m-chip.on{border-color:var(--accent);color:var(--accent-d);background:var(--accent-l)}
.add-opt{padding:12px 0;border-bottom:1px solid var(--line);cursor:pointer}
.add-opt:active{opacity:.7}
.add-opt-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px}
.add-opt-meta{font-size:12px;color:var(--text3)}

/* SETTINGS EDIT MODAL — universal */
#edit-modal{position:fixed;inset:0;background:rgba(28,26,23,.45);z-index:400;display:none;align-items:flex-end}
.edit-sheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:22px 18px calc(var(--sb) + 26px);width:100%;max-height:84vh;overflow-y:auto;box-shadow:0 -4px 24px rgba(28,26,23,.08)}
#modal-title{font-size:20px;font-weight:600;letter-spacing:-.01em;margin-bottom:18px;color:var(--text)}
.edit-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.edit-lbl{font-size:14px;font-weight:500;color:var(--text3);width:100px;flex-shrink:0}
.edit-input{flex:1;background:var(--bg3);border:1px solid var(--line);color:var(--text);border-radius:var(--r3);padding:10px 11px;font-size:15px;outline:none;-webkit-appearance:none;width:100%}
.edit-input:focus{border-color:var(--accent)}
.modal-sec-lbl{font-size:12px;font-weight:600;color:var(--text3);letter-spacing:.04em;text-transform:uppercase;margin:14px 0 10px}
.e-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px}
.e-chip{padding:8px 14px;border-radius:20px;border:1px solid var(--line2);color:var(--text3);font-size:13px;cursor:pointer;background:var(--bg2)}
.e-chip.on{border-color:var(--accent);color:var(--accent-d);background:var(--accent-l)}
.excl-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}
.excl-name{font-size:14px;font-weight:500;color:var(--text2)}
.btn-excl-rm{font-size:12px;font-weight:500;color:var(--err);background:transparent;border:1px solid #DFC8C8;border-radius:var(--r3);padding:3px 10px}
.excl-add-row{display:flex;gap:8px;margin-top:12px;align-items:center}
.btn-excl-add{padding:10px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--r3);font-size:13px;font-weight:600;white-space:nowrap;flex-shrink:0}
.btn-modal-save{width:100%;padding:13px;background:var(--accent);border:none;color:#fff;border-radius:var(--r);font-size:14px;font-weight:600;margin-top:18px}

/* QUICK LOG */
#ql-panel{position:fixed;inset:0;background:var(--bg2);z-index:250;display:none;flex-direction:column;padding:calc(var(--st) + 14px) 20px calc(var(--sb) + 22px);overflow-y:auto}
.ql-close-row{display:flex;justify-content:flex-end;margin-bottom:14px}
.ql-close{padding:9px 16px;background:var(--bg3);border:1px solid var(--line2);color:var(--text2);border-radius:var(--r);font-size:14px;font-weight:500}
.ql-ex-name{font-size:26px;font-weight:600;letter-spacing:-.02em;line-height:1.1;margin-bottom:5px;color:var(--text)}
.ql-rx{font-size:13px;font-weight:500;color:var(--text3);margin-bottom:4px}
.ql-prev{font-size:12px;color:var(--text3);margin-bottom:16px}
.ql-dots{display:flex;gap:6px;margin-bottom:20px}
.ql-dot{width:10px;height:10px;border-radius:50%;background:var(--line2);transition:background .2s}
.ql-dot.done{background:var(--ok)}
.ql-dot.cur{background:var(--accent)}
#ql-timer-wrap{margin-bottom:10px}
.ql-timer{background:var(--ok-bg);border:1px solid var(--ok-line);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;font-size:18px;font-weight:600;color:var(--ok);font-variant-numeric:tabular-nums}
.ql-timer.done{background:var(--accent-l)}
.ql-timer button{padding:6px 12px;background:transparent;border:1px solid var(--ok-line);color:var(--ok);border-radius:var(--r3);font-size:12px;font-weight:500}
.ql-inputs{display:flex;gap:10px;margin-bottom:18px}
.ql-field{flex:1;text-align:center}
.ql-field label{display:block;font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:7px}
.ql-input{width:100%;background:var(--bg3);border:1px solid var(--line);color:var(--text);border-radius:var(--r);padding:15px 5px;font-size:26px;font-weight:600;text-align:center;outline:none;-webkit-appearance:none;font-variant-numeric:tabular-nums}
.ql-input:focus{border-color:var(--accent)}
.btn-ql-log{width:100%;padding:16px;background:var(--accent);border:none;color:#fff;border-radius:var(--r);font-size:15px;font-weight:600;margin-bottom:10px}
.ql-nav{display:flex;gap:7px}
.btn-ql-nav{flex:1;padding:11px;background:transparent;border:1px solid var(--line2);color:var(--text3);border-radius:var(--r);font-size:13px;font-weight:500}

/* PROGRAM */
.prog-header{margin-bottom:20px}
.prog-name{font-size:22px;font-weight:600;letter-spacing:-.02em;color:var(--text);margin-bottom:3px}
.prog-desc{font-size:14px;color:var(--text3)}
.prog-week{margin-bottom:24px}
.prog-week-lbl{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;padding-bottom:10px;border-bottom:1px solid var(--line);margin-bottom:12px}
.prog-week-current .prog-week-lbl{color:var(--accent)}
.prog-day{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r2);padding:14px;margin-bottom:8px}
.prog-day-done{border-left:3px solid var(--ok)}
.prog-day-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.prog-day-name{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.01em}
.prog-day-focus{font-size:12px;color:var(--text3);margin-top:2px}
.prog-done-badge{font-size:11px;font-weight:600;color:var(--ok);background:var(--ok-bg);border:1px solid var(--ok-line);border-radius:var(--r3);padding:3px 9px}
.prog-ex{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--line)}
.prog-ex:last-of-type{border-bottom:none}
.prog-ex-name{font-size:14px;font-weight:500;color:var(--text2)}
.prog-ex-scheme{font-size:12px;color:var(--text3);font-variant-numeric:tabular-nums}
.prog-ss-pair{position:relative;padding:0}
.prog-ss-pair .prog-ex{padding-left:0}
.prog-ss-line{width:2px;height:6px;background:var(--info-line);margin-left:10px}
.prog-ss-tag{display:inline-block;font-size:10px;font-weight:600;color:var(--info);background:var(--info-bg);border:1px solid var(--info-line);border-radius:var(--r3);padding:2px 6px;margin-top:4px}
.prog-notes{background:var(--accent-l);border:1px solid #DFD0B8;border-radius:var(--r);padding:12px 14px;font-size:13px;color:var(--accent-d);line-height:1.6;margin-bottom:16px}
.btn-regen{width:100%;padding:12px;background:transparent;border:1px solid var(--line2);color:var(--text3);border-radius:var(--r);font-size:14px;font-weight:500;margin-top:8px}

/* PROGRESS */
.lift-sel{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--text);padding:12px 13px;border-radius:var(--r);font-size:14px;outline:none;margin-bottom:16px;-webkit-appearance:none}
.lift-hero{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px}
.lift-1rm-val{font-size:30px;font-weight:600;letter-spacing:-.02em;color:var(--accent);font-variant-numeric:tabular-nums}
.lift-1rm-unit{font-size:14px;color:var(--text3);font-weight:400;margin-left:2px}
.lift-goal-txt{font-size:13px;color:var(--text3);text-align:right}
.goal-bar{height:4px;background:var(--line);border-radius:2px;overflow:hidden;margin-bottom:20px}
.goal-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .5s}
.chart-box{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r2);padding:16px;margin-bottom:14px}
.chart-lbl{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:12px}
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:80px}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.chart-val{font-size:8px;font-weight:500;color:var(--accent);font-variant-numeric:tabular-nums}
.chart-bar{width:100%;border-radius:2px 2px 0 0;background:#E8DCCB;transition:height .4s}
.chart-col.latest .chart-bar{background:var(--accent)}
.chart-date{font-size:7px;color:var(--text3);text-align:center}
.data-tbl{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r2);overflow:hidden}
.tbl-head,.tbl-row{display:grid;grid-template-columns:1fr .55fr .45fr .65fr;padding:9px 14px}
.tbl-head{background:var(--bg3);border-bottom:1px solid var(--line);font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.04em;text-transform:uppercase}
.tbl-row{border-bottom:1px solid var(--line);font-size:13px;color:var(--text2);font-variant-numeric:tabular-nums}
.tbl-row:last-child{border-bottom:none}
.tbl-date{color:var(--text3)}
.tbl-1rm{color:var(--accent);font-weight:500}
.prog-sec{margin-bottom:28px}
.prog-sec-title{font-size:12px;font-weight:600;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;padding-bottom:10px;border-bottom:1px solid var(--line);margin-bottom:14px}
.bw-input-row{display:flex;gap:8px;margin-bottom:12px}
.bw-input{flex:1;background:var(--bg2);border:1px solid var(--line);color:var(--text);border-radius:var(--r);padding:11px 13px;font-size:20px;font-weight:500;outline:none;-webkit-appearance:none;font-variant-numeric:tabular-nums}
.bw-input:focus{border-color:var(--accent)}
.btn-bw{padding:11px 16px;background:var(--ok-bg);border:1px solid var(--ok-line);color:var(--ok);border-radius:var(--r);font-size:14px;font-weight:600}
.bw-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line)}
.bw-date{font-size:13px;color:var(--text3)}
.bw-val{font-size:13px;font-weight:500;color:var(--text2);font-variant-numeric:tabular-nums}

/* COACH */
.key-prompt{background:var(--accent-l);border:1px solid #DFD0B8;border-radius:var(--r2);padding:16px;margin-bottom:16px}
.key-prompt p{font-size:14px;color:var(--accent-d);margin-bottom:12px;line-height:1.6}
.key-input{width:100%;background:var(--bg2);border:1px solid #DFD0B8;color:var(--text);border-radius:var(--r);padding:11px 13px;font-size:14px;outline:none;margin-bottom:10px}
.coach-msgs{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;min-height:160px}
.cmsg{max-width:88%;padding:12px 15px;border-radius:16px;font-size:14px;line-height:1.65}
.cmsg.ai{align-self:flex-start;background:var(--bg2);border:1px solid var(--line);color:var(--text2);border-bottom-left-radius:4px}
.cmsg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.cmsg.loading{align-self:flex-start;background:var(--bg2);border:1px solid var(--line);color:var(--text3);font-style:italic}
.coach-sugs{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.csug{padding:7px 13px;background:var(--bg2);border:1px solid var(--line2);color:var(--text3);border-radius:20px;font-size:13px;cursor:pointer}
.csug:active{border-color:var(--accent);color:var(--accent-d);background:var(--accent-l)}
.coach-input-row{display:flex;gap:8px;position:sticky;bottom:0;background:var(--bg);padding-top:10px}
.coach-in{flex:1;background:var(--bg2);border:1px solid var(--line);color:var(--text);border-radius:22px;padding:11px 16px;font-size:14px;outline:none}
.coach-in:focus{border-color:var(--accent)}
.btn-coach-send{width:42px;height:42px;background:var(--accent);border:none;color:#fff;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* SETTINGS */
.settings-sec{margin-bottom:28px}
.settings-sec-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;padding-bottom:10px;border-bottom:1px solid var(--line);margin-bottom:2px}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--line);gap:12px}
.settings-lbl{font-size:15px;font-weight:500;color:var(--text)}
.settings-sub{font-size:13px;color:var(--text3);margin-top:3px;line-height:1.4}
.btn-edit{padding:7px 14px;border-radius:var(--r3);font-size:13px;font-weight:500;border:1px solid #DFD0B8;background:var(--accent-l);color:var(--accent-d);flex-shrink:0}
.tog{position:relative;width:44px;height:26px;cursor:pointer;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-track{position:absolute;inset:0;background:var(--line2);border-radius:13px;transition:background .2s}
.tog input:checked+.tog-track{background:var(--ok)}
.tog-thumb{position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.tog input:checked~.tog-thumb{left:21px}
.btn-action-blue{padding:7px 14px;border-radius:var(--r3);font-size:13px;font-weight:500;border:1px solid var(--info-line);background:var(--info-bg);color:var(--info)}
.btn-action-red{padding:7px 14px;border-radius:var(--r3);font-size:13px;font-weight:500;border:1px solid #DFC8C8;background:var(--err-bg);color:var(--err)}
.stat-val{font-size:15px;font-weight:600;color:var(--accent);font-variant-numeric:tabular-nums}

</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div class="screen" id="screen-setup">
  <div class="setup-wrap">
    <div class="setup-hdr">
      <div class="setup-logo">Forge</div>
      <div class="setup-tagline">Personal training system</div>
    </div>
    <div id="setup-key-wrap">
      <div class="setup-key-lbl">Anthropic API key required to get started</div>
      <div class="setup-key-row">
        <input class="setup-key-in" type="password" id="setup-key-input"
          placeholder="sk-ant-..." autocorrect="off" autocapitalize="none" spellcheck="false">
        <button class="btn-setup-key" onclick="saveSetupKey()">Save</button>
      </div>
    </div>
    <div id="setup-msgs"></div>
    <div class="setup-input-row">
      <textarea class="setup-input" id="setup-input" placeholder="Type your message..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendSetup()}"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,110)+'px'"></textarea>
      <button class="btn-setup-send" onclick="sendSetup()">&#8593;</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div class="screen" id="screen-app">
  <div id="sb-spacer"></div>
  <div id="top-nav">
    <button class="nav-btn active" id="nav-today" onclick="setPanel('today')">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
      <span class="nav-lbl">Today</span>
    </button>
    <button class="nav-btn" id="nav-program" onclick="setPanel('program')">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></span>
      <span class="nav-lbl">Program</span>
    </button>
    <button class="nav-btn" id="nav-progress" onclick="setPanel('progress')">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>
      <span class="nav-lbl">Progress</span>
    </button>
    <button class="nav-btn" id="nav-coach" onclick="setPanel('coach')">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
      <span class="nav-lbl">Coach</span>
    </button>
    <button class="nav-btn" id="nav-settings" onclick="setPanel('settings')">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
      <span class="nav-lbl">Settings</span>
    </button>
  </div>

  <div id="app-header">
    <div class="hdr-logo">Forge</div>
    <span class="hdr-info" id="hdr-info"></span>
  </div>

  <div id="session-bar">
    <div>
      <div style="font-size:11px;font-weight:600;color:var(--ok);letter-spacing:.04em;text-transform:uppercase">Session</div>
      <div class="sess-time" id="sess-time">0:00</div>
    </div>
    <button class="btn-end" onclick="endSession()">End session</button>
  </div>

  <div id="app-content">
    <div class="panel active" id="panel-today"><div id="today-content"></div></div>
    <div class="panel" id="panel-program"><div id="program-content"></div></div>
    <div class="panel" id="panel-progress"><div id="progress-content"></div></div>
    <div class="panel" id="panel-coach">
      <div id="coach-key-wrap"></div>
      <div class="coach-sugs" id="coach-sugs"></div>
      <div class="coach-msgs" id="coach-msgs"></div>
      <div class="coach-input-row">
        <input class="coach-in" id="coach-input" type="text" placeholder="Ask your coach..."
          autocomplete="off" onkeydown="if(event.key==='Enter')sendCoach()">
        <button class="btn-coach-send" onclick="sendCoach()">&#8593;</button>
      </div>
    </div>
    <div class="panel" id="panel-settings"><div id="settings-content"></div></div>
  </div>
</div>

<!-- POST WORKOUT MODAL -->
<div id="pw-modal" style="display:none">
  <div class="pw-sheet">
    <div class="pw-eyebrow">Complete</div>
    <div class="pw-title" id="pw-title"></div>
    <div class="pw-date" id="pw-date"></div>
    <div class="pw-stats" id="pw-stats"></div>
    <div id="pw-coach"></div>
    <div id="pw-prs"></div>
    <div id="pw-vol"></div>
    <button class="btn-pw-share" onclick="shareWorkout()">Share</button>
    <button class="btn-pw-close" onclick="closePW()">Done</button>
  </div>
</div>

<!-- SWAP MODAL -->
<div class="bottom-modal" id="swap-modal" style="display:none">
  <div class="modal-sheet">
    <div class="modal-title" id="swap-title">Swap exercise</div>
    <div id="swap-body"></div>
    <button class="btn-modal-close" onclick="closeSwap()">Cancel</button>
  </div>
</div>

<!-- ADD EXERCISE MODAL -->
<div class="bottom-modal" id="add-ex-modal" style="display:none">
  <div class="modal-sheet">
    <div class="modal-title" style="margin-bottom:14px">Add exercise</div>
    <input class="add-search" type="text" id="add-search" placeholder="Search..."
      oninput="renderAddResults()" autocomplete="off">
    <div class="m-chips" id="add-chips"></div>
    <div id="add-results"></div>
    <button class="btn-modal-close" onclick="closeAddEx()">Cancel</button>
  </div>
</div>

<!-- SETTINGS EDIT MODAL -->
<div id="edit-modal" style="display:none">
  <div class="edit-sheet">
    <div id="modal-title"></div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- QUICK LOG PANEL -->
<div id="ql-panel" style="display:none">
  <div class="ql-close-row">
    <button class="ql-close" onclick="closeQL()">Close</button>
  </div>
  <div class="ql-ex-name" id="ql-ex-name"></div>
  <div class="ql-rx" id="ql-rx"></div>
  <div class="ql-prev" id="ql-prev"></div>
  <div class="ql-dots" id="ql-dots"></div>
  <div id="ql-timer-wrap"></div>
  <div class="ql-inputs">
    <div class="ql-field" id="ql-kg-field">
      <label>KG</label>
      <input class="ql-input" id="ql-kg" type="number" inputmode="decimal" placeholder="—">
    </div>
    <div class="ql-field">
      <label>REPS</label>
      <input class="ql-input" id="ql-reps" type="number" inputmode="numeric" placeholder="—">
    </div>
    <div class="ql-field">
      <label>RPE</label>
      <input class="ql-input" id="ql-rpe" type="number" inputmode="decimal" placeholder="—" min="1" max="10">
    </div>
  </div>
  <button class="btn-ql-log" id="btn-ql-log">Log set</button>
  <div class="ql-nav">
    <button class="btn-ql-nav" onclick="qlPrev()">Prev</button>
    <button class="btn-ql-nav" onclick="qlSkip()">Skip</button>
    <button class="btn-ql-nav" onclick="qlNext()">Next</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════

// ── PERSISTENCE ─────────────────────────────────────────────────────
function save() {
  try {
    const d = {
      profile:S.profile, program:S.program, history:S.history, bwLog:S.bwLog,
      weekNum:S.weekNum, prefs:S.prefs, coachHistory:S.coachHistory.slice(-40),
      setupHistory:S.setupHistory.slice(-30), seenMilestones:[...S.seenMilestones], v:4,
    };
    const j = JSON.stringify(d);
    localStorage.setItem('forge-v4-a', j);
    localStorage.setItem('forge-v4-b', j);
    localStorage.setItem('forge-saved', new Date().toISOString());
  } catch(e) { console.error('save:', e); }
}

function load() {
  try {
    let best = null, bestN = -1;
    ['forge-v4-a','forge-v4-b'].forEach(k => {
      try {
        const d = JSON.parse(localStorage.getItem(k) || '{}');
        if ((d.history||[]).length >= bestN) { best = d; bestN = (d.history||[]).length; }
      } catch {}
    });
    if (!best?.profile) return false;
    Object.assign(S, {
      profile: best.profile,
      program: best.program || null,
      history: best.history || [],
      bwLog:   best.bwLog || [],
      weekNum: best.weekNum || 1,
      prefs:   { ...S.prefs, ...(best.prefs||{}) },
      coachHistory: best.coachHistory || [],
      setupHistory: best.setupHistory || [],
      seenMilestones: new Set(best.seenMilestones||[]),
    });
    return true;
  } catch(e) { console.error('load:', e); return false; }
}

// ── API ──────────────────────────────────────────────────────────────
function getKey() {
  return (S.prefs.apiKey || S.profile?.apiKey || '').replace(/[\s\n\r\t]/g, '');
}

async function ai(messages, system, maxTokens=600, model='claude-haiku-4-5-20251001') {
  const key = getKey();
  if (!key) throw new Error('No API key');
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({ model, max_tokens: maxTokens, system, messages }),
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.error?.message || `HTTP ${r.status}`);
  }
  const d = await r.json();
  return d.content?.[0]?.text || '';
}

// ── UTILITIES ────────────────────────────────────────────────────────
const rnd = (v, inc) => inc ? Math.round(v / inc) * inc : v;
const est1RM = (w, r) => (!w || !r) ? 0 : r === 1 ? w : Math.round(w * (1 + r / 30));
const toDateStr = d => new Date(d).toDateString();
const todayStr = () => new Date().toDateString();
const fmtDate = d => new Date(d).toLocaleDateString('en-AU', {day:'numeric',month:'short'});
const fmtDateLong = d => new Date(d).toLocaleDateString('en-AU', {weekday:'long',day:'numeric',month:'long'});

function getHomeSub(exId) {
  const opts = HOME_SUBS[exId]; if (!opts) return null;
  const equip = (S.profile?.homeEquipment || '').toLowerCase();
  for (const o of opts) {
    if (o.needs.every(n => equip.includes(n))) return o.id;
  }
  return opts[opts.length-1]?.id || null;
}

function getDayExercises(day) {
  if (!day?.exercises) return [];
  return day.exercises.map(e => {
    if (S.loc === 'home') {
      const ex = EX[e.id];
      if (ex && !ex.eq.includes('home')) {
        const sub = getHomeSub(e.id);
        if (sub) return { ...e, id: sub, subFor: e.id };
      }
    }
    return e;
  }).filter(e => EX[e.id]);
}

function getCurrentDay() {
  if (!S.program?.weeks) return null;
  const weeks = S.program.weeks;
  const week = weeks[Math.min(S.weekNum - 1, weeks.length - 1)];
  if (!week) return null;
  const doneThisWeek = new Set(
    S.history.filter(h => h.weekNum === S.weekNum && h.completed).map(h => h.dayId).filter(Boolean)
  );
  return week.days.find(d => !doneThisWeek.has(d.id)) || week.days[0];
}

function getPrev(exId) {
  const s = S.history.filter(h => h.exerciseId === exId && h.completed);
  return s.length ? s[s.length - 1] : null;
}

function getRecentRPE(exId, n = 3) {
  const recs = S.history.filter(h => h.exerciseId === exId && h.completed).slice(-n);
  const rpes = recs.flatMap(r => r.sets.map(s => s.rpe).filter(r => r > 0));
  return rpes.length ? rpes.reduce((a, b) => a + b) / rpes.length : null;
}

function calcRx(exId, dayEx) {
  const ex = EX[exId]; if (!ex) return null;
  const nSets = dayEx?.sets || 3;
  // Check for AI prescription first
  const aiPrx = S.program?.prescriptions?.[exId];
  const prev = getPrev(exId);
  const avgRpe = getRecentRPE(exId);

  if (!prev) {
    return { w: dayEx?.startWeight || ex.sw, r: ex.r[0], sets: nSets, reason: null, note: null };
  }

  const sets = prev.sets || [];
  if (!sets.length) {
    return { w: prev.prescribedW || ex.sw, r: ex.r[0], sets: nSets, reason: null, note: null };
  }

  let w = prev.prescribedW || ex.sw;
  let r = prev.prescribedR || ex.r[0];
  let reason = null, note = null;

  const allTop = sets.every(s => (s.reps || 0) >= ex.r[1]);
  const anyMiss = sets.some(s => (s.reps || 0) < ex.r[0] - 1);
  const highRpe = avgRpe !== null && avgRpe >= 9;
  const lowRpe = avgRpe !== null && avgRpe <= 6.5;

  if (ex.inc === 0) {
    // Bodyweight / band — progress reps
    if (allTop && !highRpe) { r = Math.min(ex.r[1] + 2, 30); reason = `+reps`; }
    else if (anyMiss) { r = Math.max(ex.r[0] - 1, 1); reason = `rebuild`; }
  } else {
    // Weighted — RPE-regulated progressive overload
    if (allTop && !highRpe) {
      if (lowRpe) { w = prev.prescribedW + ex.inc * 2; reason = `RPE low — bigger jump`; }
      else { w = prev.prescribedW + ex.inc; r = ex.r[0]; reason = `+${ex.inc}kg`; }
    } else if (anyMiss || highRpe) {
      if (highRpe && allTop) {
        // Hit reps but RPE too high — hold weight, note fatigue
        r = Math.min(r + 1, ex.r[1]);
        note = { type: 'warn', text: `RPE ${avgRpe.toFixed(1)} avg — holding weight` };
        reason = `high RPE, hold`;
      } else {
        w = Math.max(prev.prescribedW - ex.inc, ex.sw * 0.5);
        r = ex.r[0];
        reason = `-${ex.inc}kg`;
      }
    } else {
      r = Math.min(r + 1, ex.r[1]);
      reason = `+1 rep`;
    }
  }

  // AI prescription overrides if present and recent
  if (aiPrx && aiPrx.exId === exId) {
    w = aiPrx.weight || w;
    r = aiPrx.reps || r;
    reason = aiPrx.reason || reason;
    note = aiPrx.note || note;
  }

  return { w, r, sets: nSets, reason, note };
}

// ── AUDIO ────────────────────────────────────────────────────────────
function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.18, 0.36].forEach(t => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880; o.type = 'sine';
      g.gain.setValueAtTime(0.3, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.15);
      o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + 0.15);
    });
  } catch {}
}

// ── REST TIMER ───────────────────────────────────────────────────────
function startTimer(exId, secs) {
  clearInterval(S.timerInterval);
  S.timerExId = exId; S.timerEnd = Date.now() + secs * 1000; S.timerAlarmed = false;
  S.timerInterval = setInterval(tickTimer, 500);
  tickTimer();
}

function stopTimer() {
  clearInterval(S.timerInterval);
  if (S.timerExId) {
    const cs = S.cardState[S.timerExId];
    if (cs) cs.showTimer = false;
    rerenderCard(S.timerExId);
  }
  S.timerExId = null; S.timerEnd = null;
  renderQLTimer();
}

function adjTimer(delta) {
  if (S.timerEnd) { S.timerEnd += delta * 1000; tickTimer(); }
}

function tickTimer() {
  if (!S.timerExId || !S.timerEnd) return;
  const rem = Math.max(0, Math.ceil((S.timerEnd - Date.now()) / 1000));
  if (rem === 0 && !S.timerAlarmed) { beep(); S.timerAlarmed = true; }
  updateTimer(rem);
}

function updateTimer(rem) {
  const m = Math.floor(rem / 60), s = rem % 60;
  const done = rem <= 0;
  const txt = done ? 'Go' : `${m}:${String(s).padStart(2,'0')}`;

  // Update all timer displays
  ['timer-display', 'ql-timer-display'].forEach(id => {
    const el = document.getElementById(id); if (!el) return;
    el.textContent = txt;
    el.closest('.timer-wrap')?.classList.toggle('done', done);
  });

  const skipBtn = document.getElementById('timer-skip');
  if (skipBtn) skipBtn.style.background = done ? 'var(--ok)' : '';
}

function timerHTML() {
  const ex = S.timerExId ? EX[S.timerExId] : null;
  const total = ex?.rest || 120;
  const rem = S.timerEnd ? Math.max(0, Math.ceil((S.timerEnd - Date.now()) / 1000)) : total;
  const done = rem <= 0;
  const m = Math.floor(rem / 60), s = rem % 60;
  return `
    <div class="timer-wrap${done ? ' done' : ''}">
      <div class="timer-ring-wrap">
        <svg viewBox="0 0 56 56" class="timer-svg">
          <circle cx="28" cy="28" r="24" fill="none" stroke="var(--line)" stroke-width="3"/>
          <circle cx="28" cy="28" r="24" fill="none" stroke="${done?'var(--ok)':'var(--accent)'}"
            stroke-width="3" stroke-dasharray="${2*Math.PI*24}"
            stroke-dashoffset="${2*Math.PI*24*(1-rem/total)}"
            stroke-linecap="round" transform="rotate(-90 28 28)"
            style="transition:stroke-dashoffset .5s,stroke .3s"/>
        </svg>
        <span class="timer-display" id="timer-display">${done?'Go':`${m}:${String(s).padStart(2,'0')}`}</span>
      </div>
      <div class="timer-controls">
        <div class="timer-lbl">${done ? 'Load up' : 'Resting'}</div>
        <div class="timer-adj-row">
          ${[-30,-15,15,30].map(a=>`<button class="btn-adj" onclick="adjTimer(${a})">${a>0?'+'+a:a}s</button>`).join('')}
          <button class="btn-skip" id="timer-skip" onclick="stopTimer()"
            style="${done?'background:var(--ok);color:#fff':''}">Skip</button>
        </div>
      </div>
    </div>`;
}

// ── SESSION ──────────────────────────────────────────────────────────
function startSession() {
  if (S.sessionStart) return;
  S.sessionStart = Date.now();
  S.sessionInterval = setInterval(() => {
    const e = Math.floor((Date.now() - S.sessionStart) / 1000);
    const el = document.getElementById('sess-time');
    if (el) el.textContent = `${Math.floor(e/60)}:${String(e%60).padStart(2,'0')}`;
  }, 1000);
  show('session-bar');
}

function endSession() {
  clearInterval(S.sessionInterval); S.sessionStart = null; S.sessionInterval = null;
  hide('session-bar');
  const day = getCurrentDay();
  const anyLogged = Object.values(S.cardState).some(cs => cs.savedIdx?.length > 0);
  if (day && anyLogged) showPostWorkout(day);
  checkWeekComplete();
}

function checkWeekComplete() {
  if (!S.program?.weeks) return;
  const week = S.program.weeks[Math.min(S.weekNum-1, S.program.weeks.length-1)];
  if (!week) return;
  const done = new Set(S.history.filter(h => h.weekNum===S.weekNum && h.completed).map(h=>h.dayId).filter(Boolean));
  if (done.size >= week.days.length) {
    S.weekNum++;
    S.cardState = {};
    save();
    updateHeader();
    renderToday();
    toast(`Week ${S.weekNum} — ready`);
  }
}

// ── PLATES ───────────────────────────────────────────────────────────
const PLATES = [25,20,15,10,5,2.5,1.25];
const BAR = 20;

function calcPlates(kg) {
  const per = (kg - BAR) / 2; if (per < 0) return [];
  const res = []; let r = per;
  PLATES.forEach(p => { const n = Math.floor(r/p+0.001); if(n>0){res.push({p,n});r=Math.round((r-n*p)*100)/100;} });
  return res;
}

function showPlate(kg, anchorEl) {
  document.getElementById('plate-popup')?.remove();
  const tgt = parseFloat(kg); if (!tgt || tgt <= 0) return;
  const plates = calcPlates(tgt);
  const popup = document.createElement('div');
  popup.id = 'plate-popup'; popup.className = 'plate-popup';
  popup.innerHTML = `
    <div class="plate-popup-title">${tgt}kg</div>
    ${plates.length
      ? plates.map(p => `<div class="plate-row"><span>${p.p}kg</span><span class="plate-ct">×${p.n*2}</span></div>`).join('')
      : '<div class="plate-note">Just the bar (20kg)</div>'}
    <div class="plate-sides">${plates.length ? `Each side: ${plates.map(p=>`${p.p}×${p.n}`).join(' + ')}` : ''}</div>
    <button class="btn-plate-close" onclick="document.getElementById('plate-popup')?.remove()">Close</button>`;
  const rect = anchorEl.getBoundingClientRect();
  popup.style.cssText = `position:fixed;bottom:${window.innerHeight-rect.top+8}px;left:${Math.min(rect.left,window.innerWidth-230)}px;z-index:800`;
  document.body.appendChild(popup);
}
document.addEventListener('click', e => {
  const p = document.getElementById('plate-popup');
  if (p && !p.contains(e.target) && !e.target.closest('.plate-calc-btn')) p.remove();
});

// ── MILESTONES ───────────────────────────────────────────────────────
function checkMilestones(rec) {
  if (!S.prefs.milestones) return;
  const best1rm = Math.max(...rec.sets.map(s => est1RM(s.weight||0, s.reps||0)));
  if (rec.exerciseId === 'bench') {
    const tgt = parseInt(S.profile?.goals?.bench) || 100;
    [90,95,100,tgt].filter((v,i,a)=>a.indexOf(v)===i).forEach(kg => {
      const k = `bench-${kg}`;
      if (!S.seenMilestones.has(k) && best1rm >= kg) {
        S.seenMilestones.add(k); save();
        toast(kg === tgt ? `Bench target — ${kg}kg` : `Bench ~${kg}kg 1RM`, 'gold');
      }
    });
  }
  if (rec.exerciseId === 'pullups' || rec.exerciseId === 'pullups_bw') {
    const tgt = parseInt(S.profile?.goals?.pullups) || 15;
    const maxReps = Math.max(...rec.sets.map(s => s.reps||0));
    [10,12,15,tgt].filter((v,i,a)=>a.indexOf(v)===i).forEach(n => {
      const k = `pu-${n}`;
      if (!S.seenMilestones.has(k) && maxReps >= n) {
        S.seenMilestones.add(k); save();
        toast(n === tgt ? `Pull-up target — ${n} reps` : `${n} pull-ups`, 'gold');
      }
    });
  }
}

// ── ASYNC AI PRESCRIPTION (non-blocking) ─────────────────────────────
async function requestPrescription(exId) {
  try {
    const ex = EX[exId]; if (!ex) return;
    const recent = S.history.filter(h => h.exerciseId===exId && h.completed).slice(-5);
    const histStr = recent.map(h =>
      `${fmtDate(h.date)}: ${h.sets.map(s=>`${s.weight>0?s.weight+'kg×':''}${s.reps}${s.rpe?'@'+s.rpe:''}`).join(', ')}`
    ).join('\n');
    const avgRpe = getRecentRPE(exId);
    const resp = await ai([{role:'user', content:
      `Exercise: ${ex.n}
Goals: ${JSON.stringify(S.profile?.goals||{})}
Injuries: ${(S.profile?.injuries||[]).join(', ')||'none'}
Recent avg RPE: ${avgRpe ? avgRpe.toFixed(1) : 'unknown'}
Recent sessions:\n${histStr}
Next session prescription? Reply ONLY with JSON (no markdown):
{"weight":number_or_null,"reps":number,"reason":"max 6 words","note":null}`
    }], 'Strength coach. Conservative RPE-regulated progressive overload. JSON only.', 150);

    const parsed = JSON.parse(resp.trim());
    if (!S.program) S.program = {};
    if (!S.program.prescriptions) S.program.prescriptions = {};
    S.program.prescriptions[exId] = { ...parsed, exId };
    save();
  } catch (e) { /* Silent — calcRx fallback */ }
}

// ═══════════════════════════════════════════════════════════════════
// TODAY PANEL — Exercise cards, logging, superset pairs
// ═══════════════════════════════════════════════════════════════════

function renderToday() {
  const el = document.getElementById('today-content'); if (!el) return;

  if (!S.program?.weeks) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-title">No program yet</div>
        <div class="empty-sub">Go to Coach to set up your training program through a short conversation.</div>
        <button class="btn-primary" onclick="setPanel('coach')">Open Coach</button>
      </div>`;
    return;
  }

  const day = getCurrentDay();
  if (!day) {
    el.innerHTML = `<div class="empty-state"><div class="empty-title">All done this week</div><div class="empty-sub">Every scheduled session is complete. Rest up.</div></div>`;
    return;
  }

  const exItems = getDayExercises(day);

  // Initialise card state for any new exercises
  exItems.forEach(e => {
    const p = calcRx(e.id, e);
    if (!S.cardState[e.id]) {
      S.cardState[e.id] = {
        expanded: false, showTimer: false, showHist: false, editing: false,
        sets: Array.from({length: p.sets}, () => ({weight:p.w, reps:p.r, rpe:0})),
        savedIdx: [], prescription: p,
      };
    } else {
      S.cardState[e.id].prescription = p;
    }
  });

  // Build superset groups for display
  const ssGroups = S.program?.supersets || [];
  const exSS = {}; // exId -> groupIndex
  ssGroups.forEach((grp, gi) => grp.forEach(id => exSS[id] = gi));

  // Figure out done exercises today
  const doneToday = new Set(
    S.history.filter(h => h.completed && toDateStr(h.date) === todayStr()).map(h => h.exerciseId)
  );

  // Build exercise list, pairing supersets
  const rendered = new Set();
  let html = `
    <div class="today-hdr">
      <div>
        <div class="today-day">${day.name}</div>
        <div class="today-focus">${day.focus||''}</div>
      </div>
      <div class="today-actions">
        <button class="btn-sm" onclick="toggleLoc()">${S.loc==='gym'?'Home':'Gym'}</button>
        <button class="btn-sm" onclick="openQL()">Quick log</button>
      </div>
    </div>`;

  exItems.forEach(e => {
    if (rendered.has(e.id)) return;
    const gi = exSS[e.id];
    if (gi !== undefined) {
      // Find partner in this day's exercises
      const partner = exItems.find(x => exSS[x.id] === gi && x.id !== e.id);
      if (partner && !rendered.has(partner.id)) {
        rendered.add(e.id); rendered.add(partner.id);
        html += buildSupersetCard(e, partner, doneToday);
        return;
      }
    }
    rendered.add(e.id);
    html += buildSingleCard(e, doneToday.has(e.id));
  });

  html += `<button class="btn-add-ex" onclick="openAddEx()">+ Add exercise</button>`;
  el.innerHTML = html;
}

function toggleLoc() {
  S.loc = S.loc === 'gym' ? 'home' : 'gym';
  S.cardState = {};
  renderToday();
}

// ── SINGLE EXERCISE CARD ─────────────────────────────────────────────
function buildSingleCard(exItem, isDone) {
  const { id: exId } = exItem;
  const ex = EX[exId]; const cs = S.cardState[exId];
  if (!ex || !cs) return '';

  const p = cs.prescription;
  const allDone = cs.savedIdx.length > 0 && cs.savedIdx.length === cs.sets.length;
  const inProg = cs.savedIdx.length > 0 && !allDone;
  const prev = getPrev(exId);
  const best1rm = prev ? Math.max(...prev.sets.map(s => est1RM(s.weight||0, s.reps||0))) : 0;
  const prevStr = prev ? prev.sets.map(s=>`${s.weight>0?s.weight+'×':''}${s.reps}`).join(' ') : '';
  const subBadge = exItem.subFor ? `<span class="sub-badge">home sub</span>` : '';

  return `
    <div class="ex-card${cs.expanded?' expanded':''}${allDone?' done':''}${inProg?' inprog':''}" id="card-${exId}">
      ${cardHeader(exId, ex, p, prevStr, best1rm, subBadge, allDone, inProg)}
      ${cs.expanded ? cardBody(exId, ex, p, allDone) : ''}
    </div>`;
}

// ── SUPERSET CARD (paired) ───────────────────────────────────────────
function buildSupersetCard(e1, e2, doneToday) {
  const ex1 = EX[e1.id], ex2 = EX[e2.id];
  const cs1 = S.cardState[e1.id], cs2 = S.cardState[e2.id];
  if (!ex1||!ex2||!cs1||!cs2) return buildSingleCard(e1, doneToday.has(e1.id)) + buildSingleCard(e2, doneToday.has(e2.id));

  const p1 = cs1.prescription, p2 = cs2.prescription;
  const done1 = cs1.savedIdx.length === cs1.sets.length && cs1.sets.length > 0;
  const done2 = cs2.savedIdx.length === cs2.sets.length && cs2.sets.length > 0;
  const prev1 = getPrev(e1.id), prev2 = getPrev(e2.id);
  const best1 = prev1 ? Math.max(...prev1.sets.map(s=>est1RM(s.weight||0,s.reps||0))): 0;
  const best2 = prev2 ? Math.max(...prev2.sets.map(s=>est1RM(s.weight||0,s.reps||0))): 0;
  const prevStr1 = prev1 ? prev1.sets.map(s=>`${s.weight>0?s.weight+'×':''}${s.reps}`).join(' ') : '';
  const prevStr2 = prev2 ? prev2.sets.map(s=>`${s.weight>0?s.weight+'×':''}${s.reps}`).join(' ') : '';

  return `
    <div class="ss-card-wrap" id="ss-${e1.id}-${e2.id}">
      <div class="ss-label">Superset</div>
      <div class="ex-card${cs1.expanded?' expanded':''}${done1?' done':''}${cs1.savedIdx.length>0&&!done1?' inprog':''}" id="card-${e1.id}">
        ${cardHeader(e1.id, ex1, p1, prevStr1, best1, '', done1, cs1.savedIdx.length>0&&!done1)}
        ${cs1.expanded ? cardBody(e1.id, ex1, p1, done1) : ''}
      </div>
      <div class="ss-connector"></div>
      <div class="ex-card${cs2.expanded?' expanded':''}${done2?' done':''}${cs2.savedIdx.length>0&&!done2?' inprog':''}" id="card-${e2.id}">
        ${cardHeader(e2.id, ex2, p2, prevStr2, best2, '', done2, cs2.savedIdx.length>0&&!done2)}
        ${cs2.expanded ? cardBody(e2.id, ex2, p2, done2) : ''}
      </div>
    </div>`;
}

function cardHeader(exId, ex, p, prevStr, best1rm, subBadge, allDone, inProg) {
  const rx = `${p.sets} × ${ex.inc===0 ? p.r+' reps' : `${p.r} @ ${p.w}kg`}${p.reason ? ' — '+p.reason : ''}`;
  return `
    <div class="ex-header" onclick="toggleCard('${exId}')">
      <div class="ex-hdr-main">
        <div class="ex-name">${ex.n}${subBadge}</div>
        <div class="ex-rx">${rx}</div>
        ${prevStr ? `<div class="ex-prev">Last: ${prevStr}${best1rm>0?` · <span class="ex-1rm">~${best1rm}kg</span>`:''}</div>` : ''}
        ${p.note ? `<div class="ex-note ${p.note.type}">${p.note.text}</div>` : ''}
      </div>
      <div class="ex-hdr-right">
        <span class="chevron">${S.cardState[exId]?.expanded ? '▲' : '▼'}</span>
        <button class="btn-swap" onclick="event.stopPropagation();openSwap('${exId}')">Swap</button>
        ${allDone ? '<span class="done-tick">✓</span>' : ''}
        ${inProg ? `<span class="inprog-ct">${S.cardState[exId]?.savedIdx.length}/${S.cardState[exId]?.sets.length}</span>` : ''}
      </div>
    </div>`;
}

function cardBody(exId, ex, p, allDone) {
  const cs = S.cardState[exId];

  // Warmup chips (barbell lifts only)
  const warmupHTML = ex.bar && p.w > 20 ? `
    <div class="warmup-row">
      ${[{pct:.4,r:8},{pct:.6,r:5},{pct:.8,r:3}].map(wu => {
        const wt = rnd(p.w * wu.pct, 2.5);
        return `<div class="wu-chip"><div class="wu-pct">${Math.round(wu.pct*100)}%</div><div class="wu-w">${wt}</div><div class="wu-r">×${wu.r}</div></div>`;
      }).join('')}
      <div class="wu-chip wu-work"><div class="wu-pct">Work</div><div class="wu-w">${p.w}</div><div class="wu-r">×${p.r}</div></div>
    </div>` : '';

  // Timer
  const timerEl = cs.showTimer && S.timerExId === exId ? timerHTML() : '';

  // Completed (locked) sets
  const compSets = cs.sets.filter((_,i) => cs.savedIdx.includes(i));
  const compHTML = compSets.length ? `
    <div class="completed-section">
      <div class="completed-hdr">
        <span class="completed-lbl">Logged · ${compSets.length} set${compSets.length>1?'s':''}</span>
        ${cs.editing
          ? `<button class="btn-edit-done" onclick="finishEdit('${exId}')">Done</button>`
          : `<button class="btn-edit-sets" onclick="startEdit('${exId}')">Edit</button>`}
      </div>
      ${compSets.map((s,ci) => `
        <div class="set-row ${cs.editing ? 'editing' : 'locked'}">
          <span class="set-num" style="color:${cs.editing?'var(--accent)':'var(--ok)'}">${cs.editing ? ci+1 : '✓'}</span>
          <div class="set-fields">
            ${ex.inc>0 ? `<div class="fw"><input class="fi${s.weight>0?' filled':''}" type="number" inputmode="decimal" value="${s.weight||''}" ${cs.editing?`oninput="updComp('${exId}',${ci},'weight',this.value)"`:'readonly'}></div>` : ''}
            <div class="fw"><input class="fi filled" type="number" inputmode="numeric" value="${s.reps||''}" ${cs.editing?`oninput="updComp('${exId}',${ci},'reps',this.value)"`:'readonly'}></div>
            <div class="fw"><input class="fi${s.rpe>0?' filled':''}" type="number" inputmode="decimal" value="${s.rpe||''}" placeholder="—" ${cs.editing?`oninput="updComp('${exId}',${ci},'rpe',this.value)"`:'readonly'}></div>
          </div>
        </div>`).join('')}
    </div>` : '';

  // Pending sets
  const nextIdx = cs.savedIdx.length;
  const pendSets = cs.sets.filter((_,i) => !cs.savedIdx.includes(i));
  const pendHTML = !allDone ? `
    <div class="pending-lbl">Next ${pendSets.length > 1 ? `${pendSets.length} sets` : 'set'}</div>
    ${pendSets.map((s,pi) => {
      const i = nextIdx + pi;
      const isNext = pi === 0;
      const prev = getPrev(exId);
      const prevSet = prev?.sets?.[i];
      return `
        <div class="set-row pending${isNext?' next-set':''}">
          <span class="set-num">${i+1}</span>
          <div class="set-fields">
            ${ex.inc>0 ? `<div class="fw">
              ${i===0 ? '<div class="fl">KG</div>' : ''}
              <div class="field-inner">
                <input class="fi${s.weight>0?' filled':''}" type="number" inputmode="decimal"
                  value="${s.weight||''}" placeholder="—"
                  onfocus="this.select()"
                  oninput="updField('${exId}',${i},'weight',this.value)"
                  onkeydown="if(event.key==='Enter'||event.key==='Tab'){event.preventDefault();this.closest('.set-row').querySelector('input[inputmode=numeric]')?.focus()}">
                ${ex.bar ? `<button class="plate-calc-btn" onclick="showPlate(this.previousElementSibling.value||${p.w},this)">≡</button>` : ''}
              </div>
              ${prevSet ? `<div class="prev-hint">${prevSet.weight>0?prevSet.weight:''}</div>` : ''}
            </div>` : ''}
            <div class="fw">
              ${i===0 ? '<div class="fl">REPS</div>' : ''}
              <input class="fi${s.reps>0?' filled':''}" type="number" inputmode="numeric"
                value="${s.reps||''}" placeholder="—"
                onfocus="this.select()"
                oninput="updField('${exId}',${i},'reps',this.value)"
                onkeydown="if(event.key==='Enter'||event.key==='Tab'){event.preventDefault();this.closest('.set-row').querySelector('input[min]')?.focus()}">
              ${prevSet ? `<div class="prev-hint">${prevSet.reps||''}</div>` : ''}
            </div>
            <div class="fw">
              ${i===0 ? '<div class="fl">RPE</div>' : ''}
              <input class="fi${s.rpe>0?' filled':''}" type="number" inputmode="decimal"
                value="${s.rpe||''}" placeholder="—" min="1" max="10"
                onfocus="this.select()"
                oninput="updField('${exId}',${i},'rpe',this.value)"
                onkeydown="if(event.key==='Enter'){document.getElementById('btn-log-${exId}')?.click()}">
            </div>
          </div>
        </div>
        ${isNext ? `<button class="btn-log${s.reps>0?' btn-log-ready':''}" id="btn-log-${exId}"
          onclick="logSet('${exId}',${i})">${i===cs.sets.length-1?'Log final set':`Log set ${i+1}`}</button>` : ''}`;
    }).join('')}
    <button class="btn-add-set" onclick="addSet('${exId}')">+ Add set</button>` : `<div class="all-done">Complete</div>`;

  // History
  const histData = S.history.filter(h => h.exerciseId===exId && h.completed).slice(-5).reverse();
  const histHTML = histData.length ? `
    <button class="btn-hist" onclick="toggleHist('${exId}')">${cs.showHist ? 'Hide history' : `History (${histData.length})`}</button>
    <div class="hist-rows${cs.showHist?' open':''}" id="hist-${exId}">
      ${histData.map(h => `
        <div class="h-row">
          <span class="h-date">${fmtDate(h.date)}</span>
          <span class="h-sets">${h.sets.map(s=>`${s.weight>0?s.weight+'×':''}${s.reps}`).join(' ')}${h.best1rm?` · ~${h.best1rm}kg`:''}</span>
        </div>`).join('')}
    </div>` : '';

  return `<div class="ex-body">${warmupHTML}${timerEl}${compHTML}${pendHTML}${histHTML}</div>`;
}

// ── CARD INTERACTIONS ────────────────────────────────────────────────
function toggleCard(exId) {
  const cs = S.cardState[exId]; if (!cs) return;
  cs.expanded = !cs.expanded;
  rerenderCard(exId);
}

function rerenderCard(exId) {
  const old = document.getElementById('card-' + exId); if (!old) return;
  const day = getCurrentDay(); if (!day) return;
  const exItem = getDayExercises(day).find(e => e.id === exId); if (!exItem) return;
  const doneToday = new Set(S.history.filter(h=>h.completed&&toDateStr(h.date)===todayStr()).map(h=>h.exerciseId));
  const tmp = document.createElement('div');
  tmp.innerHTML = buildSingleCard(exItem, doneToday.has(exId));
  const newEl = tmp.firstElementChild; if (newEl) old.replaceWith(newEl);
  if (S.timerExId === exId && S.timerEnd) updateTimer(Math.max(0, Math.ceil((S.timerEnd-Date.now())/1000)));
}

function updField(exId, i, f, v) {
  const cs = S.cardState[exId]; if (!cs) return;
  cs.sets[i][f] = f==='reps' ? parseInt(v)||0 : parseFloat(v)||0;
  const btn = document.getElementById('btn-log-' + exId);
  if (btn) btn.classList.toggle('btn-log-ready', (cs.sets[cs.savedIdx.length]?.reps||0) > 0);
}

function updComp(exId, i, f, v) {
  const cs = S.cardState[exId]; if (!cs) return;
  cs.sets[i][f] = f==='reps' ? parseInt(v)||0 : parseFloat(v)||0;
}

function startEdit(exId) { const cs=S.cardState[exId]; if(cs){cs.editing=true;rerenderCard(exId);} }

function finishEdit(exId) {
  const cs = S.cardState[exId]; if (!cs) return;
  cs.editing = false;
  // Persist edits to history
  for (let i = S.history.length-1; i >= 0; i--) {
    if (S.history[i].exerciseId===exId && S.history[i].completed) {
      S.history[i].sets = cs.sets.filter((_,j) => cs.savedIdx.includes(j));
      break;
    }
  }
  save(); rerenderCard(exId);
}

function addSet(exId) {
  const cs = S.cardState[exId]; if (!cs) return;
  const last = cs.sets[cs.sets.length-1] || {weight:cs.prescription.w, reps:cs.prescription.r, rpe:0};
  cs.sets.push({...last, rpe:0});
  rerenderCard(exId); toast('Set added');
}

function toggleHist(exId) { const cs=S.cardState[exId]; if(cs){cs.showHist=!cs.showHist;rerenderCard(exId);} }

function logSet(exId, idx) {
  const cs = S.cardState[exId]; if (!cs || cs.savedIdx.includes(idx)) return;
  cs.savedIdx.push(idx);
  cs.showTimer = true;

  startSession();
  startTimer(exId, EX[exId]?.rest || 90);

  if (cs.savedIdx.length === cs.sets.length) {
    const best1rm = Math.max(...cs.sets.map(s => est1RM(s.weight||0, s.reps||0)));
    const rec = {
      id: Date.now(), exerciseId: exId, weekNum: S.weekNum,
      dayId: getCurrentDay()?.id, date: new Date().toISOString(),
      prescribedW: cs.prescription.w, prescribedR: cs.prescription.r,
      sets: [...cs.sets], completed: true, best1rm: best1rm || null,
    };
    S.history.push(rec);
    save();
    checkMilestones(rec);
    if (getKey()) requestPrescription(exId);
  }
  rerenderCard(exId);
  renderQLTimer();
}

// ── SWAP ─────────────────────────────────────────────────────────────
function openSwap(exId) {
  S._swapExId = exId;
  const ex = EX[exId]; if (!ex) return;
  const excl = (S.profile?.exclusions||[]).map(e=>e.toLowerCase());
  const cands = new Set();
  ex.m.forEach(m => Object.entries(EX).forEach(([id,e]) => { if(e.m.includes(m)&&id!==exId) cands.add(id); }));
  const opts = [...cands].filter(id => {
    const e = EX[id]; if (!e) return false;
    if (excl.some(x => e.n.toLowerCase().includes(x))) return false;
    return S.loc==='home' ? e.eq.includes('home') : e.eq.includes('gym');
  }).slice(0,8);

  const el = document.getElementById('swap-body');
  if (el) el.innerHTML = opts.length
    ? opts.map(id=>`<div class="swap-opt" onclick="doSwap('${id}')"><div class="swap-opt-name">${EX[id].n}</div><div class="swap-opt-meta">${EX[id].m.join(', ')} · ${EX[id].rest}s rest</div></div>`).join('')
    : '<div class="empty-sub">No alternatives for current equipment.</div>';

  const title = document.getElementById('swap-title');
  if (title) title.textContent = `Swap: ${ex.n}`;
  document.getElementById('swap-modal').style.display = 'flex';
}
function closeSwap() { document.getElementById('swap-modal').style.display='none'; }
function doSwap(newId) {
  const exId = S._swapExId; if (!exId) return;
  const p = calcRx(newId, null);
  S.cardState[newId] = {
    expanded:false, showTimer:false, showHist:false, editing:false,
    sets:Array.from({length:p.sets},()=>({weight:p.w,reps:p.r,rpe:0})),
    savedIdx:[], prescription:p,
  };
  const old = document.getElementById('card-' + exId);
  if (old) {
    const tmp = document.createElement('div');
    tmp.innerHTML = buildSingleCard({id:newId}, false);
    const ne = tmp.firstElementChild; if (ne) old.replaceWith(ne);
  }
  toast(`Swapped to ${EX[newId].n}`);
  closeSwap();
}

// ── ADD EXERCISE ──────────────────────────────────────────────────────
function openAddEx() {
  S._addMusFilter = 'all';
  const inp = document.getElementById('add-search'); if(inp) inp.value='';
  renderAddChips(); renderAddResults();
  document.getElementById('add-ex-modal').style.display = 'flex';
}
function closeAddEx() { document.getElementById('add-ex-modal').style.display='none'; }
function renderAddChips() {
  const muscles = ['all','chest','lats','upper back','side delt','rear delt','triceps','biceps','quads','hamstrings','glutes','abs'];
  const el = document.getElementById('add-chips'); if(!el) return;
  el.innerHTML = muscles.map(m=>
    `<button class="m-chip${m===S._addMusFilter?' on':''}" onclick="setMusFilter(this,'${m}')">${m==='all'?'All':m}</button>`
  ).join('');
}
function setMusFilter(btn, m) {
  S._addMusFilter = m;
  document.querySelectorAll('.m-chip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');
  renderAddResults();
}
function renderAddResults() {
  const q = (document.getElementById('add-search')?.value||'').toLowerCase();
  const excl = (S.profile?.exclusions||[]).map(e=>e.toLowerCase());
  const res = Object.entries(EX).filter(([id,ex])=>{
    if(excl.some(e=>ex.n.toLowerCase().includes(e)))return false;
    if(S.loc==='home'&&!ex.eq.includes('home'))return false;
    if(S.loc==='gym'&&!ex.eq.includes('gym'))return false;
    if(S._addMusFilter!=='all'&&!ex.m.includes(S._addMusFilter))return false;
    if(q&&!ex.n.toLowerCase().includes(q))return false;
    return true;
  });
  const el = document.getElementById('add-results'); if(!el) return;
  el.innerHTML = res.length
